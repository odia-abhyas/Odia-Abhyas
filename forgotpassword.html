<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forget Password</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;font-family:Arial}
body{
margin:0;
height:100vh;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
}

/* Card */
.card{
width:90%;
max-width:360px;
background:#F0E9E9;
padding:22px;
border-radius:16px;
box-shadow:0 25px 40px rgba(0,0,0,.4);
}

h2{text-align:center;margin-bottom:18px;}

input{
width:100%;
padding:12px;
margin-bottom:14px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#2c5364;
color:#fff;
font-size:16px;
margin-bottom:10px;
}

/* Popup */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#fff;
padding:20px;
border-radius:14px;
width:80%;
text-align:center;
}
</style>
</head>
<body>

<div class="card" id="verifyCard">
<h2>Verify Account</h2>
<input id="phone" placeholder="Phone Number" maxlength="10">
<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<button onclick="verifyUser()">Verify</button>
</div>

<div class="card" id="resetCard" style="display:none;">
<h2>Reset Password</h2>
<input id="newPassword" type="password" placeholder="New Password">
<button onclick="savePassword()">Save Password</button>
</div>

<!-- Popup -->
<div class="popup" id="popup">
<div class="popup-box">
<p id="popupText"></p>
<button onclick="closePopup()" style="
margin-top:12px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#2c5364;
color:#fff;">Close</button>
</div>
</div>

<script>

/* Firebase Init */
firebase.initializeApp({
  apiKey: "AIzaSyAm8LD9iSm24vG2rc_bBSjXuATXxs7-lbE",
  authDomain: "odia-abhyas.firebaseapp.com",
  projectId: "odia-abhyas"
});
const db = firebase.firestore();

/* Popup */
function showPopup(msg){
document.getElementById("popupText").innerText = msg;
document.getElementById("popup").style.display="flex";
}
function closePopup(){
document.getElementById("popup").style.display="none";
}

let verifiedPhone = null;

/* Verify User */
function verifyUser(){
const phone = document.getElementById("phone").value.trim();
const name  = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim();

if(!/^\d+$/.test(phone)) return showPopup("Invalid phone number");
if(!name) return showPopup("Enter name");
if(!email.includes("@")) return showPopup("Invalid email");

db.collection("users").doc(phone).get()
.then(doc=>{
if(!doc.exists) return showPopup("Account not found");

const data = doc.data();

/* Case insensitive match */
if(
data.name.toLowerCase() !== name.toLowerCase() ||
data.email.toLowerCase() !== email.toLowerCase()
){
return showPopup("Details do not match");
}

/* Verified */
verifiedPhone = phone;
showPopup("✅ Verified Successfully");
document.getElementById("verifyCard").style.display="none";
document.getElementById("resetCard").style.display="block";

})
.catch(err=>showPopup("Error: "+err.message));
}

/* Save Password */
function savePassword(){
const newPass = document.getElementById("newPassword").value.trim();

if(newPass.length < 4)
return showPopup("Password must be at least 4 characters");

if(!verifiedPhone)
return showPopup("Verification required");

db.collection("users").doc(verifiedPhone).update({
password: newPass
})
.then(()=>{
showPopup("✅ Password Updated Successfully");

/* Redirect after 2 sec */
setTimeout(()=>{
window.location.href="index.html";
},2000);

})
.catch(err=>showPopup("Error: "+err.message));
}

</script>

</body>
</html>
